<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MuddyGob</title>
  <link rel="stylesheet" href="style.css">
  <link id="theme-css" rel="stylesheet" href="" onerror="this.removeAttribute('href')">
</head>
<body>

<!-- ▓▓ WELCOME ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓ -->
<div id="welcome">
  <h1>1MUDDYGOB</h1>
  <p>a dark fantasy multiplayer story</p>
  <button id="btn-new">New Character</button>
  <button id="btn-login">Login</button>
</div>

<!-- ▓▓ GAME ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓ -->
<div id="game" class="hidden">

  <!-- Top HUD -->
  <div id="hud">
    <div id="hud-left">
      <div id="hud-conn">○</div>
      <div id="hud-name">—</div>
    </div>
    <div id="hud-stats">
      <span class="stat" id="stat-level">Lv 1</span>
      <span class="stat" id="stat-energy">⚡100</span>
      <span class="stat" id="stat-stamina">💪100</span>
    </div>
  </div>

  <!-- West/East edge tap zones -->
  <div class="mzone" id="mz-west" data-dir="west"><span class="mzone-vert">← west</span></div>
  <div class="mzone" id="mz-east" data-dir="east"><span class="mzone-vert">east →</span></div>

  <!-- Room content -->
  <div id="room">

    <!-- North button — above room title, below HUD -->
    <button class="dir-btn hidden" id="dir-north" data-dir="north">↑ north</button>

    <div id="room-top">
      <div id="room-title"></div>
      <div id="room-desc"></div>

      <div id="discovered" class="hidden">
        <div class="sec-label">Discovered</div>
        <div id="disc-chips"></div>
      </div>

      <div id="ctx" class="hidden">
        <div class="sec-label" id="ctx-who"></div>
        <div id="ctx-btns"></div>
      </div>
    </div>

    <div id="log-divider"></div>
    <div id="log"></div>

    <!-- South button — between log and input -->
    <button class="dir-btn hidden" id="dir-south" data-dir="south">↓ south</button>

    <div id="input-bar">
      <select id="chat-mode">
        <option value="say">say</option>
        <option value="yell">yell</option>
        <option value="tell">tell</option>
        <option value="emote">emote</option>
      </select>
      <input id="chat-in" type="text" placeholder="..." autocomplete="off" spellcheck="false">
      <button id="chat-send">→</button>
    </div>

  </div>

  <!-- Bottom bar -->
  <div id="botbar">
    <div id="botbar-left">
      <button class="bot-btn" id="btn-bag">🎒</button>
      <div class="hand" id="hand-l">✋</div>
      <div class="hand" id="hand-r">🤚</div>
    </div>
    <button class="bot-btn danger" id="btn-quit">quit</button>
  </div>

</div>

<!-- ▓▓ AUTH MODAL ▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓▓ -->
<div id="overlay" class="hidden">
  <div id="modal">
    <div id="modal-title">Create a Being</div>

    <label>Name</label>
    <input id="a-name" type="text" autocomplete="off">

    <label id="race-label">Race</label>
    <div class="choices" id="race-choices">
      <button class="choice" data-val="goblin">Goblin</button>
      <button class="choice" data-val="human">Human</button>
      <button class="choice" data-val="elf">Elf</button>
    </div>

    <label id="pronoun-label">Pronouns</label>
    <div class="choices" id="pronoun-choices">
      <button class="choice" data-val="he">He</button>
      <button class="choice" data-val="she">She</button>
      <button class="choice" data-val="they">They</button>
      <button class="choice" data-val="it">It</button>
    </div>

    <label>Password</label>
    <input id="a-pass" type="password" autocomplete="off">

    <div id="a-err"></div>

    <div class="modal-btns">
      <button id="a-confirm">Enter</button>
      <button id="a-cancel">Back</button>
    </div>
  </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
